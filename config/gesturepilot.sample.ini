# GesturePilot-C runtime config
confidence_threshold=0.80
stable_frames=4
cooldown_ms=900
loop_interval_ms=33
total_frames=250
dry_run=0
model_path=models\gesturepilot.onnx

# Gesture -> Action mapping
# Open palm: Left click
map.open_palm=mouse_click_left

# Point: Move right
map.point=mouse_right

# V-sign: Move left
map.v_sign=mouse_left

# Three: Move up
map.three=mouse_up

# Four: Move down
map.four=mouse_down

# Fist: Right click
map.fist=mouse_click_right

