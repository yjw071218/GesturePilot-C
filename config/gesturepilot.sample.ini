# GesturePilot-C runtime config
confidence_threshold=0.80
stable_frames=4
cooldown_ms=900
loop_interval_ms=33
total_frames=250
dry_run=1
model_path=models\gesturepilot.onnx

# Gesture -> Action mapping
map.open_palm=play_pause
map.point=next_slide
map.v_sign=prev_slide
map.three=volume_up
map.four=volume_down
map.fist=none

